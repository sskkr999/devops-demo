<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Save Details</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 30px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; }
        input { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
        button { padding: 10px 20px; background: #2d6cdf; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
        a.logout { float: right; color: #999; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <a class="logout" th:href="@{/logout}">Logout</a>
    <h2>Add a Person(V2)</h2>
    <form th:action="@{/save}" method="post">
        <label>Name</label>
        <input type="text" name="name" required>
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Phone</label>
        <input type="text" name="phone" required>
        <label>Address</label>
        <input type="text" name="address" required> 
        <label>Company Name</label>
        <input type="text" name="companyName" required>
        <button type="submit">Save</button>
        
    </form>

    <h3>Saved Records</h3>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Company Name</th>
        </tr>
        <tr th:each="p : ${people}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.email}"></td>
            <td th:text="${p.phone}"></td>
            <td th:text="${p.address}"></td>
            <td th:text="${p.companyName}"></td>
        </tr>
    </table>
</div>
</body>
</html>
