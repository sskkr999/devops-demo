server.port=8080

# DB_HOST/DB_NAME/DB_USER/DB_PASS default to local values now.
# Later, when we run in Docker/Kubernetes, we override these with
# environment variables instead of editing code - that's the point.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:devopsdb}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Auto-creates/updates the table from the Person entity. Fine for learning;
# real projects use migration tools like Flyway/Liquibase instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Exposes /actuator/health and /actuator/prometheus - Kubernetes and
# Prometheus will both use these endpoints later in the project.
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
