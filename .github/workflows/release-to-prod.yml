name: Release to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'The exact image tag (commit SHA) to release to PROD'
        required: true
        type: string

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 > /tmp/ecr-token.txt
            sudo k3s ctr images pull --user AWS:$(cat /tmp/ecr-token.txt) 519818056492.dkr.ecr.us-east-1.amazonaws.com/devops-demo-app:${{ inputs.image_tag }}
            kubectl set image deployment/app-deployment devops-demo-app=519818056492.dkr.ecr.us-east-1.amazonaws.com/devops-demo-app:${{ inputs.image_tag }} -n prod
            kubectl rollout status deployment/app-deployment -n prod
            rm /tmp/ecr-token.txt