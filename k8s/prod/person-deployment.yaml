apiVersion: apps/v1
kind: Deployment
metadata:
  name: person-service
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: person-service
      env: prod
  template:
    metadata:
      labels:
        app: person-service
        env: prod
    spec:
      containers:
        - name: person-service
          image: 519818056492.dkr.ecr.us-east-1.amazonaws.com/person-service:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "400Mi"
              cpu: "300m"
          env:
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_NAME
              value: "devopsdb_prod"
            - name: DB_USER
              value: "appuser"
            - name: DB_PASS
              value: "apppassword"
          ports:
            - containerPort: 8082
